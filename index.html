<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人生拍卖会 | 湖南大学土木工程学院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #0f172a; /* Deep slate/navy */
            color: #f8fafc;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .title-font {
            font-family: 'ZCOOL KuaiLe', cursive, 'Noto Sans SC';
        }
        
        /* Background decorative elements */
        .bg-pattern {
            background-image: radial-gradient(rgba(253, 224, 71, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* 3D Flip Card Styles */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-container {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }
        .is-flipped .card-container {
            transform: rotateY(180deg);
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(253, 224, 71, 0.4); }
            50% { box-shadow: 0 0 30px rgba(253, 224, 71, 0.8); }
        }
        .animate-pulse-glow { animation: pulse-glow 2s infinite; }

        /* Hide scrollbar for neatness */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-900 bg-pattern relative min-h-screen pb-24">

    <canvas id="confetti" class="fixed inset-0 pointer-events-none z-50"></canvas>

    <div class="max-w-md mx-auto relative z-10 bg-slate-900/40 min-h-screen border-x border-slate-800/50 shadow-2xl backdrop-blur-sm">
        
        <header class="pt-12 pb-8 px-6 text-center relative overflow-hidden">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-indigo-600/30 rounded-full blur-3xl -z-10"></div>
            
            <div class="inline-block border border-yellow-500/30 bg-yellow-500/10 text-yellow-300 text-[10px] font-bold px-3 py-1 rounded-full mb-4 tracking-widest uppercase">
                湖南大学土木工程学院 · 心语茶话
            </div>
            
            <h1 class="text-5xl title-font text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 to-yellow-500 filter drop-shadow-[0_2px_10px_rgba(234,179,8,0.3)] mb-2">
                人生拍卖会
            </h1>
            <p class="text-indigo-200 text-sm font-medium tracking-widest mt-3">—— 室内心理成长营 ——</p>
        </header>

        <section class="px-6 mb-10">
            <div class="bg-gradient-to-br from-indigo-900 to-slate-800 rounded-2xl p-6 border border-indigo-500/30 shadow-xl relative overflow-hidden">
                <div class="absolute -right-6 -top-6 text-6xl opacity-10">💰</div>
                
                <h2 class="text-sm text-indigo-200 mb-1">你的专属启动资金</h2>
                
                <div id="wallet-balance" class="text-4xl font-black text-white title-font tracking-wider my-2">
                    0
                </div>
                
                <p id="wallet-hint" class="text-xs text-slate-400 mb-5">点击下方按钮，领取入场筹码</p>
                
                <button id="claim-btn" onclick="claimMoney()" class="w-full bg-gradient-to-r from-yellow-400 to-yellow-600 hover:from-yellow-300 hover:to-yellow-500 text-slate-900 font-bold py-3 rounded-xl transition-all active:scale-95 animate-pulse-glow flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" /></svg>
                    点击领取 1,000,000 筹码
                </button>
            </div>
        </section>

        <section class="px-6 mb-10">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                    <span class="text-xl">🔨</span> 绝密拍品图鉴
                </h3>
                <span class="text-[10px] text-slate-400">点击卡片翻转预览</span>
            </div>

            <div class="grid grid-cols-2 gap-4">
                
                <div class="perspective-1000 aspect-[3/4] cursor-pointer group" onclick="this.classList.toggle('is-flipped')">
                    <div class="card-container w-full h-full relative transform-style-3d">
                        <div class="absolute inset-0 backface-hidden bg-slate-800 border border-slate-700 rounded-xl p-4 flex flex-col items-center justify-center text-center shadow-lg group-hover:border-indigo-400/50 transition-colors">
                            <div class="w-12 h-12 rounded-full bg-indigo-900/50 flex items-center justify-center text-2xl mb-3">❓</div>
                            <h4 class="text-sm font-bold text-slate-200">神秘拍品 01</h4>
                            <p class="text-[10px] text-indigo-400 mt-2 font-mono">LOT 01</p>
                        </div>
                        <div class="absolute inset-0 backface-hidden rotate-y-180 bg-indigo-600 border border-indigo-400 rounded-xl p-4 flex flex-col items-center justify-center text-center shadow-lg">
                            <h4 class="text-sm font-bold text-yellow-300 mb-2">关于「告别延期」的机密规划</h4>
                            <p class="text-xs text-white/90 leading-relaxed font-medium">从课程到毕业，每一步的重点都已为你标好。</p>
                            <div class="mt-auto bg-yellow-400 text-slate-900 text-[10px] font-black px-3 py-1 rounded-full">
                                起拍: 10 万
                            </div>
                        </div>
                    </div>
                </div>

                <div class="perspective-1000 aspect-[3/4] cursor-pointer group" onclick="this.classList.toggle('is-flipped')">
                    <div class="card-container w-full h-full relative transform-style-3d">
                        <div class="absolute inset-0 backface-hidden bg-slate-800 border border-slate-700 rounded-xl p-4 flex flex-col items-center justify-center text-center shadow-lg group-hover:border-indigo-400/50 transition-colors">
                            <div class="w-12 h-12 rounded-full bg-indigo-900/50 flex items-center justify-center text-2xl mb-3">❓</div>
                            <h4 class="text-sm font-bold text
